<style>
  /* Scoped Animations & Custom Gradients */
  [data-gl-hero] .animate-bg-breathe {
    animation: gl-bg-breathe 20s ease-in-out infinite alternate;
  }
  @keyframes gl-bg-breathe {
    from { transform: scale(1.06); }
    to   { transform: scale(1.12); }
  }

  [data-gl-hero] .gold-gradient-text {
    background: linear-gradient(95deg, #c48a47 0%, #ffdb70 45%, #c48a47 100%);
    background-size: 220% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: gl-gold-sweep 5s linear infinite;
  }
  @keyframes gl-gold-sweep {
    0% { background-position: 0% center; }
    100% { background-position: 220% center; }
  }

  [data-gl-hero] .animate-pulse-ring {
    animation: gl-pulse-ring 2.2s ease-in-out infinite;
  }
  @keyframes gl-pulse-ring {
    0% { box-shadow: 0 0 0 0 rgba(255,204,78,0.55); }
    60% { box-shadow: 0 0 0 7px rgba(255,204,78,0); }
    100% { box-shadow: 0 0 0 0 rgba(255,204,78,0); }
  }

  [data-gl-hero] .particle-animation {
    animation: gl-float-p var(--dur, 9s) ease-in-out var(--del, 0s) infinite;
  }
  @keyframes gl-float-p {
    0% { opacity: 0; transform: translateY(0) scale(0.3); }
    12% { opacity: var(--op, .3); }
    88% { opacity: var(--op, .3); }
    100% { opacity: 0; transform: translateY(-90px) scale(1); }
  }

  [data-gl-hero] .form-bar-anim {
    background: linear-gradient(90deg, #c48a47 0%, #ffcc4e 40%, #e8a832 70%, #c48a47 100%);
    background-size: 250% auto;
    animation: gl-bar-slide 3s linear infinite;
  }
  @keyframes gl-bar-slide {
    0% { background-position: 0% center; }
    100% { background-position: 250% center; }
  }

  [data-gl-hero] .scroll-bob {
    animation: gl-scroll-bob 2s ease-in-out infinite;
  }
  @keyframes gl-scroll-bob {
    0%, 100% { transform: translateY(0); opacity: 1; }
    65% { transform: translateY(9px); opacity: 0.15; }
  }

  /* Entrance Animations */
  [data-gl-hero] .reveal-rise {
    opacity: 0;
    animation: gl-rise 0.8s cubic-bezier(0.16, 1, 0.3, 1) var(--delay, 0s) forwards;
  }
  @keyframes gl-rise {
    from { opacity: 0; transform: translateY(26px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>

<script>
  (function() {
    const form = document.getElementById('hero-form');
    const submitBtn = document.getElementById('f-submit');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      // Basic Validation Logic
      const name = document.getElementById('f-name');
      const phone = document.getElementById('f-phone');
      const prog = document.getElementById('f-prog');
      let isValid = true;

      if (name.value.length < 2) {
        document.getElementById('err-name').classList.remove('hidden');
        isValid = false;
      } else {
        document.getElementById('err-name').classList.add('hidden');
      }

      if (!/^[6-9]\d{9}$/.test(phone.value)) {
        document.getElementById('err-phone').classList.remove('hidden');
        isValid = false;
      } else {
        document.getElementById('err-phone').classList.add('hidden');
      }

      if (isValid) {
        submitBtn.disabled = true;
        submitBtn.textContent = "Processing...";
        
        // Simulate API
        await new Promise(r => setTimeout(r, 1500));
        
        submitBtn.style.background = "#22c55e";
        submitBtn.style.color = "#ffffff";
        submitBtn.textContent = "✅ Request Sent!";
        form.reset();
      }
    });

    // Clean phone input
    document.getElementById('f-phone').addEventListener('input', function(e) {
      this.value = this.value.replace(/\D/g, '').slice(0, 10);
    });
  })();
</script>
